<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>My Cute ToDo</title>

<link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Kosugi Maru', sans-serif;
  background: repeating-linear-gradient(45deg,#fef6ff,#fef6ff 20px,#f9f0ff 20px,#f9f0ff 40px);
  text-align: center;
  padding: 40px;
}

.container {
  background: white;
  max-width: 420px;
  margin: auto;
  padding: 25px;
  border-radius: 16px;
}

h1 { color: #d291bc; }

img.main {
  width: 120px;
  border-radius: 50%;
}

input, select {
  padding: 8px;
  margin: 5px;
  border-radius: 10px;
  border: 2px solid #ffd6e0;
}

button {
  padding: 8px;
  border: none;
  background: #ffd6e0;
  border-radius: 999px;
  cursor: pointer;
}

li {
  background: #f9f0ff;
  margin: 8px 0;
  padding: 10px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
}

.overdue {
  background: #ffd6d6;
}

.done {
  text-decoration: line-through;
  color: #aaa;
}
</style>
</head>

<body>

<div class="container">

<img src="madonsoku.png" class="main">

<h1>🌷 ToDo 🌷</h1>

<input id="taskInput" placeholder="やること">
<input type="date" id="dueDate">

<select id="status">
  <option>未対応</option>
  <option>対応中</option>
  <option>完了</option>
</select>

<br>
<button onclick="addTask()">追加</button>

<br><br>

<select id="filter" onchange="render()">
  <option value="all">すべて</option>
  <option value="未対応">未対応</option>
  <option value="対応中">対応中</option>
  <option value="完了">完了</option>
</select>

<ul id="taskList"></ul>

</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function save() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function isOverdue(date, status) {
  if (status === "完了") return false;
  return new Date(date) < new Date().setHours(0,0,0,0);
}

function render() {
  const list = document.getElementById("taskList");
  const filter = document.getElementById("filter").value;
  list.innerHTML = "";

  tasks.sort((a,b)=> new Date(a.date) - new Date(b.date));

  tasks.forEach((task, index) => {

    if (filter !== "all" && task.status !== filter) return;

    const li = document.createElement("li");
    li.draggable = true;

    if (isOverdue(task.date, task.status)) {
      li.classList.add("overdue");
    }

    const text = document.createElement("div");
    text.innerHTML = `
      ${task.status==="完了"?"😴":task.status==="対応中"?"🔥":"🐰"}
      ${task.text}<br>
      📅 ${task.date} / ${task.status}
    `;

    if (task.status==="完了") text.classList.add("done");

    text.onclick = () => {
      const order=["未対応","対応中","完了"];
      let i=order.indexOf(task.status);
      task.status=order[(i+1)%3];
      save(); render();
    };

    const del = document.createElement("button");
    del.textContent="×";
    del.onclick=()=>{
      tasks.splice(index,1);
      save(); render();
    };

    li.appendChild(text);
    li.appendChild(del);

    // ドラッグ
    li.ondragstart = ()=> {
      li.classList.add("dragging");
    };

    li.ondragend = ()=> {
      li.classList.remove("dragging");
      save();
    };

    li.ondragover = (e)=> {
      e.preventDefault();
      const dragging = document.querySelector(".dragging");
      if (dragging !== li) {
        const from = [...list.children].indexOf(dragging);
        const to = [...list.children].indexOf(li);
        tasks.splice(to,0,tasks.splice(from,1)[0]);
        render();
      }
    };

    list.appendChild(li);
  });
}

function addTask() {
  const text=document.getElementById("taskInput").value;
  const date=document.getElementById("dueDate").value;
  const status=document.getElementById("status").value;

  if(!text||!date) return;

  tasks.push({text,date,status});
  save(); render();

  document.getElementById("taskInput").value="";
}

render();
</script>

</body>
</html>
