<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>My Cute ToDo</title>

<style>
body {
  font-family: sans-serif;
  background: repeating-linear-gradient(
    45deg,
    #fef6ff,
    #fef6ff 20px,
    #f9f0ff 20px,
    #f9f0ff 40px
  );
  text-align: center;
  padding: 40px;
}

h1 {
  color: #d291bc;
}

.container {
  background: white;
  max-width: 420px;
  margin: auto;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 6px 12px rgba(0,0,0,0.1);
}

img.main {
  width: 120px;
  border-radius: 50%;
  margin-bottom: 10px;
}

input {
  padding: 10px;
  width: 65%;
  border: 2px solid #ffd6e0;
  border-radius: 10px;
}

button {
  padding: 10px;
  border: none;
  background: #ffd6e0;
  border-radius: 10px;
  cursor: pointer;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  background: #f9f0ff;
  margin: 8px 0;
  padding: 10px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.left {
  display: flex;
  align-items: center;
  gap: 8px;
}

.done {
  text-decoration: line-through;
  color: #aaa;
}
</style>
</head>

<body>

<div class="container">

  <!-- 上の画像（ここに三浦大輔の画像） -->
  <img src="miura.png" class="main">

  <h1>🌷 My ToDo</h1>

  <input id="taskInput" placeholder="やること入力..." />
  <button onclick="addTask()">追加</button>

  <ul id="taskList"></ul>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function save() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function render() {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  tasks.forEach((task, index) => {
    const li = document.createElement("li");

    const left = document.createElement("div");
    left.className = "left";

    // アイコン（状態で変化）
    const icon = document.createElement("span");
    icon.textContent = task.done ? "😴" : "🐰";

    const text = document.createElement("span");
    text.textContent = task.text;
    if (task.done) text.classList.add("done");

    text.onclick = () => {
      task.done = !task.done;
      save();
      render();
    };

    left.appendChild(icon);
    left.appendChild(text);

    const del = document.createElement("button");
    del.textContent = "×";
    del.onclick = () => {
      tasks.splice(index, 1);
      save();
      render();
    };

    li.appendChild(left);
    li.appendChild(del);

    list.appendChild(li);
  });
}

function addTask() {
  const input = document.getElementById("taskInput");
  if (input.value.trim() === "") return;

  tasks.push({ text: input.value, done: false });
  input.value = "";
  save();
  render();
}

render();
</script>

</body>
</html>
